<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اليوم الروحي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .float-animation {
      animation: floaty 3s ease-in-out infinite;
    }

    @keyframes floaty {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    .gradient-text {
      background: linear-gradient(45deg, #ff006e, #ffbe0b, #8338ec, #3a86ff, #ff006e);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .button-hover {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .button-hover::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transition: left 0.5s ease;
      z-index: -1;
    }

    .button-hover:hover::before {
      left: 100%;
    }

    .button-hover:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      filter: brightness(1.1);
    }

    .button-hover:active {
      transform: translateY(-2px) scale(1.02);
    }

    .logo-glow {
      filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6));
      animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6)); }
      50% { filter: drop-shadow(0 0 40px rgba(147, 51, 234, 0.8)); }
    }
  </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-2xl flex flex-col items-center justify-center gap-10 float-animation">

    <!-- LOGO -->
    <div class="w-40 h-40 bg-gradient-to-br from-blue-500 via-purple-500 to-pink-500 rounded-3xl flex items-center justify-center shadow-2xl logo-glow">
      <span class="text-7xl">✨</span>
    </div>

    <!-- TITLE -->
    <div class="text-center">
      <h1 class="gradient-text text-5xl md:text-7xl font-black tracking-tighter mb-6 leading-tight">
        اليوم<br>الروحي
      </h1>
      <div class="h-2 w-24 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 mx-auto rounded-full shadow-lg"></div>
    </div>

    <!-- 4 BUTTONS in 2x2 GRID -->
    <div class="w-full grid grid-cols-2 gap-6 mt-10 max-w-lg">
      
      <a href="day_schedule.html" class="button-hover bg-gradient-to-br from-blue-600 to-blue-800 py-5 px-4 rounded-2xl text-center font-bold text-base md:text-lg shadow-lg">
        📅<br>جدول اليوم
      </a>

      <a href="she3ar%20el%20youm.html" class="button-hover bg-gradient-to-br from-purple-600 to-purple-800 py-5 px-4 rounded-2xl text-center font-bold text-base md:text-lg shadow-lg">
        🎭<br>الشعار
      </a>

      <a href="tranim.html" class="button-hover bg-gradient-to-br from-pink-600 to-pink-800 py-5 px-4 rounded-2xl text-center font-bold text-base md:text-lg shadow-lg">
        🎵<br>ترنيمة
      </a>

      <a href="Case_study.html" class="button-hover bg-gradient-to-br from-green-600 to-green-800 py-5 px-4 rounded-2xl text-center font-bold text-base md:text-lg shadow-lg">
        📖<br>حالات دراسة
      </a>

    </div>

  </div>

</body>
</html>
