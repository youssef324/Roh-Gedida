<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشعار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            direction: rtl;
        }

        .logo-small {
            position: fixed;
            top: 4px;
            left: 4px;
            width: 60px;
            height: 60px;
            background: linear-gradient(to br, #3b82f6, #8b5cf6);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        .logo-small:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff006e, #ffbe0b, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 768px) {
            .gradient-text {
                font-size: 3rem !important;
            }
        }

        @media (max-width: 480px) {
            .gradient-text {
                font-size: 2.2rem !important;
            }
        }

        .glowing-text {
            animation: glow 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.8), 0 0 40px rgba(139, 92, 246, 0.6);
            font-size: 1rem;
            line-height: 2;
            letter-spacing: 0.5px;
            word-spacing: 1px;
        }

        @media (max-width: 768px) {
            .glowing-text {
                font-size: 0.95rem;
                line-height: 1.9;
            }
        }

        @media (max-width: 480px) {
            .glowing-text {
                font-size: 0.9rem;
                line-height: 1.8;
                letter-spacing: 0.3px;
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(59, 130, 246, 0.8), 0 0 40px rgba(139, 92, 246, 0.6);
                filter: brightness(1);
            }
            50% {
                text-shadow: 0 0 30px rgba(139, 92, 246, 1), 0 0 60px rgba(59, 130, 246, 0.8), 0 0 20px #ff006e;
                filter: brightness(1.2);
            }
        }

        .glow-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .glow-box {
                padding: 30px 20px;
                border-radius: 20px;
            }
        }

        @media (max-width: 480px) {
            .glow-box {
                padding: 25px 15px;
                border-radius: 15px;
            }
        }
    </style>
</head>
<body class="text-white min-h-screen p-4 flex items-center justify-center">

    <!-- Logo Top Left -->
    <img src="logo.jpg" alt="Logo" class="fixed top-4 left-4 w-15 h-15 logo-small rounded-full object-cover">

    <div class="max-w-2xl w-full mt-20 px-2">
        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="gradient-text text-5xl md:text-6xl font-black tracking-tighter mb-4">
                شعار اليوم
            </h1>
            <div class="h-2 w-20 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 mx-auto rounded-full"></div>
        </div>

        <!-- Glowing Text -->
        <div class="glow-box">
            <p class="glowing-text text-center">
                (انظروا الى الاجيال و تاملوا ..... .من توكل على الرب و خذله)2<br>من دعا فى وقت الضيق و رده <br>من قصد بابه فاغلقه<br>( انه الرب الاله يدعوك لتمسك يداه ....<br>...لا تقسي قلبك يوم انتسمع نداه)3
            </p>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-8">
            <a href="index.html" class="inline-block bg-gradient-to-r from-blue-600 to-blue-800 px-8 py-3 rounded-2xl font-bold hover:scale-105 transition">
               HOME  ← 
            </a>
        </div>
    </div>

</body>
</html>
