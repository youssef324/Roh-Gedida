<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترنيمة اليوم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            direction: rtl;
        }

        .logo-small {
            position: fixed;
            top: 4px;
            left: 4px;
            width: 60px;
            height: 60px;
            background: linear-gradient(to br, #3b82f6, #8b5cf6);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        .logo-small:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff006e, #ffbe0b, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .image-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .image-card:hover img {
            transform: scale(1.05);
        }

        .image-label {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body class="text-white min-h-screen p-4">

    <!-- Logo Top Left -->
    <img src="logo.jpg" alt="Logo" class="fixed top-4 left-4 w-15 h-15 logo-small">

    <div class="max-w-4xl mx-auto mt-20">
        <!-- Title -->
        <div class="text-center mb-12">
            <h1 class="gradient-text text-5xl md:text-6xl font-black tracking-tighter mb-6">
                ترنيمة اليوم
            </h1>
            <div class="h-2 w-20 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 mx-auto rounded-full"></div>
        </div>

        <!-- 4 Images Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            
            <!-- Image 1 -->
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=500&h=350&fit=crop" alt="موسيقى 1">
                <div class="image-label">🎵 ترنيمة أولى</div>
            </div>

            <!-- Image 2 -->
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1511379938547-c1f69b13d835?w=500&h=350&fit=crop" alt="موسيقى 2">
                <div class="image-label">🎶 ترنيمة ثانية</div>
            </div>

            <!-- Image 3 -->
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500&h=350&fit=crop" alt="موسيقى 3">
                <div class="image-label">🎼 ترنيمة ثالثة</div>
            </div>

            <!-- Image 4 -->
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=500&h=350&fit=crop" alt="موسيقى 4">
                <div class="image-label">🎤 ترنيمة رابعة</div>
            </div>

        </div>

       

        <!-- Back Button -->
        <div class="text-center mt-10">
            <a href="index.html" class="inline-block bg-gradient-to-r from-blue-600 to-blue-800 px-8 py-3 rounded-2xl font-bold hover:scale-105 transition">
               HOME  ← 
            </a>
        </div>
    </div>

</body>
</html>
